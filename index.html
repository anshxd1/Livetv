<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live TV • AllInOne Reborn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .channel-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .channel-card:hover { transform: scale(1.05); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <header class="bg-black border-b border-zinc-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-tv text-4xl text-red-500"></i>
        <h1 class="text-3xl font-bold tracking-tighter">Live TV</h1>
        <span class="text-xs bg-red-500 text-white px-2 py-1 rounded-full font-medium">REBORN</span>
      </div>
      <input id="search" type="text" placeholder="Search channels..." 
             class="w-96 bg-zinc-900 border border-zinc-700 rounded-full px-5 py-3 focus:outline-none focus:border-red-500">
      <div class="flex items-center gap-2 text-sm">
        <div class="bg-green-500 w-3 h-3 rounded-full animate-pulse"></div>
        LIVE
      </div>
    </header>

    <div class="flex">
      <!-- Sidebar Categories -->
      <div class="w-64 bg-zinc-900 min-h-screen p-6 border-r border-zinc-800 hidden lg:block">
        <h2 class="text-lg font-semibold mb-4 text-zinc-400">CATEGORIES</h2>
        <div id="categories" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Main Content -->
      <div class="flex-1 p-6">
        <h2 class="text-2xl font-bold mb-6" id="title">All Channels</h2>
        <div id="channels-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
      </div>
    </div>
  </div>

  <script>
    let allChannels = [];
    let selectedCategory = 'All';

    async function loadData() {
      const [channelsRes, cookiesRes] = await Promise.all([
        fetch('https://allinonereborn.online/jtv-fetch/jstr4web.json'),
        fetch('https://allinonereborn.online/jstrweb2/cookies.json')
      ]);
      allChannels = await channelsRes.json();
      const cookies = await cookiesRes.json();
      window.globalCookie = cookies[1].cookie; // token globally save

      renderCategories();
      renderChannels();
    }

    function renderCategories() {
      const cats = new Set(allChannels.map(ch => ch.category));
      let html = `<button onclick="filterCategory('All')" class="category-btn active px-5 py-2 text-sm rounded-3xl bg-red-600">All</button>`;
      cats.forEach(cat => {
        if (cat && cat !== "Unknown") {
          html += `<button onclick="filterCategory('${cat}')" class="category-btn px-5 py-2 text-sm rounded-3xl bg-zinc-800 hover:bg-zinc-700">${cat}</button>`;
        }
      });
      document.getElementById('categories').innerHTML = html;
    }

    function filterCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'bg-red-600'));
      event.target.classList.add('active', 'bg-red-600');
      renderChannels();
    }

    function renderChannels(filtered = null) {
      const grid = document.getElementById('channels-grid');
      grid.innerHTML = '';
      
      let channels = filtered || allChannels;
      if (selectedCategory !== 'All') {
        channels = channels.filter(ch => ch.category === selectedCategory);
      }

      // Search filter
      const searchTerm = document.getElementById('search').value.toLowerCase();
      if (searchTerm) {
        channels = channels.filter(ch => ch.name.toLowerCase().includes(searchTerm));
      }

      channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = `channel-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer`;
        card.innerHTML = `
          <div class="relative">
            <img src="${ch.logo}" class="w-full aspect-video object-cover">
            <div class="absolute top-3 right-3 bg-black/70 text-xs px-3 py-1 rounded-3xl flex items-center gap-1">
              <i class="fa-solid fa-circle text-red-500"></i> LIVE
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-medium text-lg leading-tight">${ch.name}</h3>
            <p class="text-zinc-400 text-sm mt-1">${ch.category}</p>
          </div>
        `;
        card.onclick = () => window.location.href = `player.html?id=${ch.id}`;
        grid.appendChild(card);
      });

      if (channels.length === 0) {
        grid.innerHTML = `<p class="text-center text-zinc-500 col-span-full py-20">No channels found 😔</p>`;
      }
    }

    document.getElementById('search').addEventListener('input', () => renderChannels());

    // Load everything
    loadData();
  </script>
</body>
</html>
