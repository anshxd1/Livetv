<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TV • Reborn</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body { font-family: system-ui; }
.channel-card { transition: 0.25s; outline: none; }
.channel-card:hover, .channel-card:focus { transform: scale(1.05); }
</style>
</head>

<body class="bg-black text-white">

<div class="max-w-7xl mx-auto p-4">

<!-- HEADER -->
<div class="flex flex-col md:flex-row justify-between items-center gap-3 mb-6">
  <h1 class="text-3xl font-bold text-red-500">🔥 Live TV</h1>

  <input id="search" placeholder="Search channels..."
    class="bg-zinc-900 px-4 py-2 rounded-full outline-none border border-zinc-700 w-full md:w-80">
</div>

<!-- CONTINUE WATCHING -->
<div id="continueBox" class="mb-6 hidden"></div>

<!-- CATEGORY -->
<div id="categories" class="flex gap-2 flex-wrap mb-6"></div>

<!-- GRID -->
<div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>

</div>

<script>
const API = "https://allinonereborn.online/jtv-fetch/jstr4web.json";
const PROXY = "https://api.allorigins.win/raw?url=";

let allChannels = [];
let selectedCategory = "All";

let favs = JSON.parse(localStorage.getItem("favs") || "[]");
let last = localStorage.getItem("last");

// FETCH
async function fetchData(url){
  const res = await fetch(PROXY + encodeURIComponent(url));
  if(!res.ok) throw new Error("Fetch failed");
  return res.json();
}

// LOADING UI
function showSkeleton(){
  document.getElementById("grid").innerHTML =
    Array(12).fill().map(()=>`
      <div class="bg-zinc-800 h-40 rounded-xl animate-pulse"></div>
    `).join("");
}

// ERROR
function showError(msg){
  document.getElementById("grid").innerHTML =
    `<p class="col-span-full text-center text-red-500 py-20">${msg}</p>`;
}

// LOAD DATA
async function loadData(){
  showSkeleton();
  try{
    const data = await fetchData(API);
    if(!Array.isArray(data)) throw new Error("Invalid JSON");

    allChannels = data;

    renderContinue();
    renderCategories();
    renderChannels();

  }catch(e){
    console.error(e);
    showError("❌ API Failed / Blocked");
  }
}

// CONTINUE WATCHING
function renderContinue(){
  if(!last) return;

  const ch = allChannels.find(c=>c.id == last);
  if(!ch) return;

  document.getElementById("continueBox").innerHTML = `
    <div onclick="openPlayer('${ch.id}')"
    class="bg-zinc-900 p-4 rounded-xl cursor-pointer flex items-center gap-4">
      <img src="${ch.logo}" class="w-20 h-12 object-cover rounded">
      <div>
        <p class="text-sm text-zinc-400">Continue Watching</p>
        <h3 class="font-semibold">${ch.name}</h3>
      </div>
    </div>
  `;
  document.getElementById("continueBox").classList.remove("hidden");
}

// CATEGORY
function renderCategories(){
  const cats = ["All","Favorites", ...new Set(allChannels.map(c=>c.category).filter(Boolean))];

  document.getElementById("categories").innerHTML =
    cats.map(c=>`
      <button onclick="setCategory('${c}', event)"
      class="px-4 py-1 rounded-full text-sm ${c==="All"?"bg-red-600":"bg-zinc-800"}">
      ${c}
      </button>
    `).join("");
}

function setCategory(cat,e){
  selectedCategory = cat;

  document.querySelectorAll("#categories button")
    .forEach(b=>b.classList.remove("bg-red-600"));

  e.target.classList.add("bg-red-600");

  renderChannels();
}

// RENDER CHANNELS
function renderChannels(){
  let data = [...allChannels];

  if(selectedCategory==="Favorites"){
    data = data.filter(c=>favs.includes(c.id));
  }else if(selectedCategory!=="All"){
    data = data.filter(c=>c.category === selectedCategory);
  }

  const search = document.getElementById("search").value.toLowerCase();
  if(search){
    data = data.filter(c=>c.name.toLowerCase().includes(search));
  }

  const grid = document.getElementById("grid");

  if(data.length === 0){
    grid.innerHTML = `<p class="col-span-full text-center text-zinc-500 py-20">No channels 😢</p>`;
    return;
  }

  grid.innerHTML = data.map(ch=>`
    <div tabindex="0"
    class="channel-card bg-zinc-900 rounded-xl overflow-hidden relative">

      <img loading="lazy" src="${ch.logo}" class="w-full h-32 object-cover">

      <button onclick="toggleFav('${ch.id}')"
      class="absolute top-2 right-2 text-lg">
        ${favs.includes(ch.id) ? "❤️" : "🤍"}
      </button>

      <div onclick="openPlayer('${ch.id}')" class="p-2 cursor-pointer">
        <h3 class="text-sm font-semibold">${ch.name}</h3>
        <p class="text-xs text-zinc-400">${ch.category}</p>
      </div>

    </div>
  `).join("");
}

// FAVORITES
function toggleFav(id){
  if(favs.includes(id)){
    favs = favs.filter(f=>f!==id);
  }else{
    favs.push(id);
  }
  localStorage.setItem("favs", JSON.stringify(favs));
  renderChannels();
}

// OPEN PLAYER
function openPlayer(id){
  localStorage.setItem("last", id);
  location.href = "player.html?id=" + id;
}

// SEARCH
document.getElementById("search").addEventListener("input", renderChannels);

// KEYBOARD NAV
document.addEventListener("keydown", e=>{
  const items = [...document.querySelectorAll(".channel-card")];
  let index = items.indexOf(document.activeElement);

  if(e.key==="ArrowRight") items[index+1]?.focus();
  if(e.key==="ArrowLeft") items[index-1]?.focus();
  if(e.key==="Enter") document.activeElement.click();
});

// INIT
loadData();
</script>

</body>
</html>
