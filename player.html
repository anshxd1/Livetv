<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player • Live TV</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.0/shaka-player.compiled.min.js"></script>

<style>
body{margin:0;background:black;color:white;font-family:sans-serif;}
video{width:100%;height:100vh;background:black;}
.topbar{
  position:absolute;
  top:0;left:0;right:0;
  padding:10px 15px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()" class="text-lg">⬅ Back</button>
  <span id="title"></span>
</div>

<video id="video" controls autoplay></video>

<script>
const API = "https://allinonereborn.online/jtv-fetch/jstr4web.json";
const COOKIE_API = "https://allinonereborn.online/jstrweb2/cookies.json";
const PROXY = "https://api.allorigins.win/raw?url=";

async function fetchData(url){
  const res = await fetch(PROXY + encodeURIComponent(url));
  if(!res.ok) throw new Error("Fetch failed");
  return res.json();
}

async function init(){
  try{
    const id = new URLSearchParams(location.search).get("id");

    const [channels, cookies] = await Promise.all([
      fetchData(API),
      fetchData(COOKIE_API)
    ]);

    const ch = channels.find(c=>c.id == id);
    if(!ch) return alert("Channel not found");

    document.getElementById("title").innerText = ch.name;

    const cookie = cookies?.[1]?.cookie || "";

    const video = document.getElementById("video");
    const player = new shaka.Player(video);

    player.getNetworkingEngine().registerRequestFilter((type, request)=>{
      request.headers["Cookie"] = cookie;
    });

    // MULTI STREAM FALLBACK
    const sources = [ch.url, ch.backup1, ch.backup2].filter(Boolean);

    let played = false;

    for(let src of sources){
      try{
        await player.load(src);
        console.log("✅ Playing:", src);
        played = true;
        break;
      }catch(e){
        console.log("❌ Failed:", src);
      }
    }

    if(!played){
      alert("All streams failed 😢");
    }

  }catch(e){
    console.error(e);
    alert("Playback Error");
  }
}

function goBack(){
  history.back();
}

init();
</script>

</body>
</html>
